name: Deploy to GitHub Pages

# Publishes the static site (index.html at repo root) to GitHub Pages.
on:
  push:
    branches:
      - claude/mobile-card-game-prototype-86Yx7
  workflow_dispatch:

# Permissions required for the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let in-progress finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # Pages must be enabled once in Settings -> Pages -> Source:
        # "GitHub Actions". The Actions token here is not permitted to
        # create the Pages site itself, so enablement is left off.
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
